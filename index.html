<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGuard - Cybersecurity Toolkit</title>
    <style>
        /* Same beautiful CSS - keeping it short */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff; min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header h1 { 
            font-size: 3rem; 
            background: linear-gradient(45deg, #00d4ff, #ff6b6b); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-align: center; margin-bottom: 40px;
        }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .tool-card { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); 
            border-radius: 20px; padding: 25px; transition: all 0.3s;
        }
        .tool-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,212,255,0.2); }
        .input-group input { 
            width: 100%; padding: 12px; background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; 
            color: #fff; font-size: 1rem;
        }
        .btn { 
            background: linear-gradient(135deg, #00d4ff, #0099cc); color: white; 
            border: none; padding: 12px 30px; border-radius: 10px; 
            font-size: 1rem; cursor: pointer; width: 100%; margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,212,255,0.3); }
        .results { margin-top: 20px; padding: 20px; border-radius: 12px; }
        .success { background: rgba(46,204,113,0.2); border-left: 4px solid #2ecc71; }
        .warning { background: rgba(241,196,15,0.2); border-left: 4px solid #f1c40f; }
        .danger { background: rgba(231,76,60,0.2); border-left: 4px solid #e74c3c; }
        .info { background: rgba(52,152,219,0.2); border-left: 4px solid #3498db; }
        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #2ecc71, #27ae60); transition: width 0.5s; border-radius: 4px; }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ CyberGuard Toolkit</h1>
            <p>🔒 Password + Headers + URL Scanner - 100% Working!</p>
        </div>

        <div class="tools-grid">
            <!-- Password Checker -->
            <div class="tool-card">
                <h3>🔐 Password Strength</h3>
                <div class="input-group">
                    <input type="password" id="passwordInput" placeholder="Enter password...">
                </div>
                <button class="btn" onclick="checkPassword()">🔍 Analyze Password</button>
                <div id="passwordResult"></div>
            </div>

            <!-- Real Headers Checker -->
            <div class="tool-card">
                <h3>📋 HTTP Headers Scanner</h3>
                <div class="input-group">
                    <input type="url" id="headersUrl" placeholder="https://google.com">
                </div>
                <button class="btn" onclick="checkRealHeaders()">🔍 Check Real Headers</button>
                <div id="headersResult"></div>
            </div>

            <!-- URL Scanner -->
            <div class="tool-card">
                <h3>🌐 URL Security Check</h3>
                <div class="input-group">
                    <input type="url" id="urlInput" placeholder="https://example.com">
                </div>
                <button class="btn" onclick="scanURL()">🔍 Scan URL</button>
                <div id="urlResult"></div>
            </div>
        </div>
    </div>

    <script>
        // 🔥 PASSWORD ANALYZER - 100% Working
        function checkPassword() {
            const password = document.getElementById('passwordInput').value;
            const result = document.getElementById('passwordResult');
            
            if (!password) {
                result.innerHTML = '<div class="results warning">⚠️ Password দিন!</div>';
                return;
            }

            const analysis = analyzePassword(password);
            const scorePercent = (analysis.score / 10) * 100;
            
            result.innerHTML = `
                <div class="results ${analysis.level}">
                    <h4>${analysis.emoji} ${analysis.message}</h4>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${scorePercent}%"></div>
                    </div>
                    <p><strong>Score:</strong> ${analysis.score}/10</p>
                    <p><strong>Crack Time:</strong> ${analysis.crackTime}</p>
                    <details>
                        <summary>💡 Improvement Tips</summary>
                        <ul>${analysis.tips.map(tip => `<li>${tip}</li>`).join('')}</ul>
                    </details>
                </div>
            `;
        }

        function analyzePassword(pw) {
            let score = 0;
            const tips = [];

            // Length check
            if (pw.length >= 12) score += 3;
            else if (pw.length >= 8) score += 1;
            else tips.push('কমপক্ষে 12 characters ব্যবহার করুন');

            // Variety checks
            if (/[A-Z]/.test(pw)) score += 1;
            else tips.push('Uppercase letter যোগ করুন');
            
            if (/[a-z]/.test(pw)) score += 1;
            else tips.push('Lowercase letter যোগ করুন');
            
            if (/\d/.test(pw)) score += 1;
            else tips.push('Number যোগ করুন');
            
            if (/[!@#$%^&*]/.test(pw)) score += 2;
            else tips.push('Special character যোগ করুন');

            // Common password check
            const common = ['password', '123456', 'qwerty', 'admin', 'bangladesh'];
            if (!common.some(c => pw.toLowerCase().includes(c))) score += 2;

            score = Math.min(score, 10);

            const levels = ['danger', 'warning', 'success'];
            const level = levels[Math.floor(score / 4)] || 'danger';

            const crackTimes = ['তাৎক্ষণিক', 'মিনিট', 'ঘন্টা', 'দিন', 'মাস', 'বছর', 'শতাব্দী'];
            const crackTime = crackTimes[Math.min(Math.floor(score / 1.5), crackTimes.length - 1)];

            const messages = [
                'খুব দুর্বল 😞', 'দুর্বল ⚠️', 'মাঝারি 🙂', 
                'ভালো 👍', 'শক্তিশালী 🔥', 'অসাধারণ 💪'
            ];

            return {
                score,
                level,
                message: messages[Math.floor(score / 2)] || messages[5],
                emoji: ['😞', '⚠️', '🙂', '👍', '🔥', '💪'][Math.floor(score / 2)],
                crackTime,
                tips: tips.length ? tips : ['চমৎকার password! 👍']
            };
        }

        // 🔥 REAL HTTP HEADERS CHECKER - CORS Fixed!
        async function checkRealHeaders() {
            const url = document.getElementById('headersUrl').value;
            const result = document.getElementById('headersResult');
            
            if (!url) {
                result.innerHTML = '<div class="results warning">URL দিন!</div>';
                return;
            }

            result.innerHTML = '<div class="results info loading">🔄 Real headers checking... (CORS Proxy)</div>';

            try {
                // ✅ CORS Proxy + Real Fetch
                const corsUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                const response = await fetch(corsUrl, { 
                    method: 'HEAD',
                    mode: 'cors',
                    cache: 'no-cache'
                });

                const headers = {};
                response.headers.forEach((value, key) => {
                    headers[key] = value;
                });

                // Security headers analysis
                const securityHeaders = analyzeSecurityHeaders(headers);
                const score = securityHeaders.score;
                const statusClass = score >= 80 ? 'success' : score >= 50 ? 'warning' : 'danger';

                let html = `<div class="results ${statusClass}">
                    <h4>${securityHeaders.emoji} Security Score: ${score}/100</h4>`;

                // Show critical headers
                securityHeaders.headers.forEach(h => {
                    const status = h.secure ? '✅' : '❌';
                    html += `<div style="padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <strong>${status} ${h.name}:</strong> ${h.value?.substring(0, 50)}${h.value?.length > 50 ? '...' : ''}
                    </div>`;
                });

                html += `<p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                    <p><strong>Server:</strong> ${headers['server'] || 'Unknown'}</p>
                </div>`;

                result.innerHTML = html;

            } catch (error) {
                result.innerHTML = `
                    <div class="results danger">
                        <h4>❌ Error: ${error.message}</h4>
                        <p>কিছু sites CORS block করে। Try: google.com, github.com</p>
                    </div>
                `;
            }
        }

        function analyzeSecurityHeaders(headers) {
            const criticalHeaders = {
                'strict-transport-security': headers['strict-transport-security'] ? true : false,
                'content-security-policy': headers['content-security-policy'] ? true : false,
                'x-frame-options': headers['x-frame-options'] ? true : false,
                'x-content-type-options': headers['x-content-type-options'] === 'nosniff',
                'referrer-policy': headers['referrer-policy'] ? true : false,
                'permissions-policy': headers['permissions-policy'] ? true : false
            };

            let score = 0;
            const headerList = [];

            Object.entries(criticalHeaders).forEach(([name, passed]) => {
                score += passed ? 20 : 0;
                headerList.push({
                    name: name.replace(/-/g, ' ').toUpperCase(),
                    value: headers[name.replace(/-/g, '-').toLowerCase()] || 'Missing',
                    secure: passed
                });
            });

            return {
                score: Math.min(score, 100),
                emoji: score >= 80 ? '🔒' : score >= 50 ? '🔓' : '🚨',
                headers: headerList
            };
        }

        // URL Scanner
        function scanURL() {
            const url = document.getElementById('urlInput').value;
            const result = document.getElementById('urlResult');
            
            if (!url) {
                result.innerHTML = '<div class="results warning">URL দিন!</div>';
                return;
            }

            try {
                const urlObj = new URL(url.startsWith('http') ? url : 'https://' + url);
                const checks = {
                    https: urlObj.protocol === 'https:',
                    validDomain: urlObj.hostname.length > 2,
                    noSuspiciousTLD: !['tk','ml','ga','cf','gq'].includes(urlObj.hostname.split('.').pop()),
                    reasonablePath: urlObj.pathname.length < 100
                };

                const passed = Object.values(checks).filter(Boolean).length;
                const score = (passed / Object.keys(checks).length) * 100;

                result.innerHTML = `
                    <div class="results ${score >= 75 ? 'success' : 'warning'}">
                        <h4>${score >= 75 ? '✅' : '⚠️'} URL Score: ${Math.round(score)}%</h4>
                        ${Object.entries(checks).map(([key, pass]) => 
                            `<div>${pass ? '✅' : '❌'} ${key.replace(/([A-Z])/g, ' $1').trim()}</div>`
                        ).join('')}
                    </div>
                `;
            } catch (e) {
                result.innerHTML = '<div class="results danger">Invalid URL!</div>';
            }
        }

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.activeElement.id === 'passwordInput') checkPassword();
                if (document.activeElement.id === 'headersUrl') checkRealHeaders();
                if (document.activeElement.id === 'urlInput') scanURL();
            }
        });

        // Demo URLs
        window.onload = () => {
            document.getElementById('headersUrl').value = 'https://google.com';
            document.getElementById('urlInput').value = 'https://github.com';
        };
    </script>
</body>
    </html>
